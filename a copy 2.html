<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  font-family: Inter, Arial, sans-serif;
  background: #05020a;
  color: #fff;
}

.alis-header {
  position: relative;
  min-height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 20%, rgba(145, 60, 255, 0.22), transparent 32%),
    radial-gradient(circle at 80% 30%, rgba(98, 0, 255, 0.20), transparent 34%),
    linear-gradient(135deg, #07020f 0%, #0d0618 45%, #030106 100%);
}

.header-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.35;
  background-image:
    linear-gradient(rgba(174, 90, 255, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(174, 90, 255, 0.08) 1px, transparent 1px);
  background-size: 52px 52px;
  mask-image: linear-gradient(to bottom, black, transparent 85%);
}

.alis-header::before {
  content: "";
  position: absolute;
  inset: -40%;
  background:
    conic-gradient(from 180deg, transparent, rgba(162, 72, 255, 0.18), transparent 35%);
      animation: rotateAura 16s linear infinite;
  pointer-events: none;
}

.alis-header::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 5px
    );
  mix-blend-mode: screen;
  opacity: 0.18;
  pointer-events: none;
}

.navbar {
  position: relative;
  z-index: 5;
  width: min(1180px, calc(100% - 40px));
  margin: 0 auto;
  padding: 28px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: #fff;
  font-weight: 900;
  letter-spacing: 3px;
}

.logo-mark {
  color: #b46cff;
  text-shadow: 0 0 14px rgba(180, 108, 255, 0.9);
}

.logo-text {
  position: relative;
  font-size: 20px;
  text-shadow: 0 0 18px rgba(180, 108, 255, 0.7);
}

.logo-text::before,
.logo-text::after {
  content: attr(data-text);
    position: absolute;
  inset: 0;
  opacity: 0.7;
  pointer-events: none;
}

.logo-text::before {
  color: #ff4df8;
  transform: translateX(-2px);
  clip-path: inset(0 0 55% 0);
  animation: glitchOne 2.8s infinite linear alternate-reverse;
}

.logo-text::after {
  color: #7b61ff;
  transform: translateX(2px);
  clip-path: inset(55% 0 0 0);
  animation: glitchTwo 2.4s infinite linear alternate-reverse;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 34px;
}

.nav-links a {
  position: relative;
  color: rgba(255,255,255,0.68);
  text-decoration: none;
  font-size: 14px;
  transition: 0.25s ease;
}

.nav-links a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -8px;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, #8f3cff, #e37bff);
  box-shadow: 0 0 12px rgba(180, 108, 255, 0.9);
  transition: 0.25s ease;
}

.nav-links a:hover {
  color: #fff;
}

.nav-links a:hover::after {
  width: 100%;
}

.nav-button {
  text-decoration: none;
  color: #fff;
    padding: 12px 18px;
  border: 1px solid rgba(188, 120, 255, 0.55);
  border-radius: 999px;
  background: rgba(117, 44, 255, 0.12);
  box-shadow:
    inset 0 0 18px rgba(166, 82, 255, 0.14),
    0 0 28px rgba(120, 48, 255, 0.18);
  backdrop-filter: blur(12px);
  transition: 0.25s ease;
}

.nav-button:hover {
  transform: translateY(-2px);
  background: rgba(147, 69, 255, 0.22);
  box-shadow: 0 0 34px rgba(180, 108, 255, 0.35);
}

.hero-header {
  position: relative;
  z-index: 3;
  width: min(1180px, calc(100% - 40px));
  min-height: calc(100vh - 96px);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  align-items: center;
  gap: 60px;
}

.hero-content {
  max-width: 720px;
}

.eyebrow {
  display: inline-block;
  margin-bottom: 22px;
  color: #c99aff;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 4px;
  text-shadow: 0 0 16px rgba(201, 154, 255, 0.7);
}

.hero-content h1 {
  font-size: clamp(44px, 7vw, 86px);
  line-height: 0.95;
  letter-spacing: -3px;
    color: #fff;
  text-shadow: 0 0 34px rgba(147, 69, 255, 0.28);
}

.hero-content h1 span {
  display: block;
  color: transparent;
  background: linear-gradient(90deg, #ffffff, #b46cff, #ff7bff);
  background-clip: text;
  -webkit-background-clip: text;
  filter: drop-shadow(0 0 18px rgba(180, 108, 255, 0.42));
}

.hero-content p {
  margin-top: 26px;
  max-width: 560px;
  color: rgba(255,255,255,0.64);
  font-size: 17px;
  line-height: 1.7;
}

.hero-actions {
  margin-top: 34px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.primary-btn,
.secondary-btn {
  text-decoration: none;
  padding: 15px 22px;
  border-radius: 14px;
  font-weight: 800;
  transition: 0.25s ease;
}

.primary-btn {
  color: #fff;
  background: linear-gradient(135deg, #7b2cff, #c45cff);
  box-shadow: 0 0 32px rgba(153, 70, 255, 0.48);
}

.primary-btn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 0 46px rgba(190, 92, 255, 0.72);
}

.secondary-btn {
  color: #d9c3ff;
  border: 1px solid rgba(197, 136, 255, 0.34);  
    background: rgba(255,255,255,0.035);
}

.secondary-btn:hover {
  color: #fff;
  background: rgba(176, 102, 255, 0.12);
}

.hero-orb {
  position: relative;
  width: min(420px, 80vw);
  aspect-ratio: 1;
  justify-self: center;
  display: grid;
  place-items: center;
}

.orb-core {
  width: 52%;
  aspect-ratio: 1;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 30%, #fff, #d7b4ff 13%, #8e3dff 36%, #1a0636 72%);
  box-shadow:
    0 0 40px rgba(190, 112, 255, 0.8),
    0 0 100px rgba(125, 44, 255, 0.5),
    inset 0 0 34px rgba(255,255,255,0.28);
  animation: pulseOrb 3.2s ease-in-out infinite;
}

.orb-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(201, 154, 255, 0.45);
  box-shadow: 0 0 24px rgba(176, 94, 255, 0.35);
}

.ring-1 {
  width: 78%;
  height: 78%;
  animation: spin 9s linear infinite;
}

.ring-2 {
  width: 100%;
  height: 100%;
  border-style: dashed;
  opacity: 0.65;
  animation: spinReverse 14s linear infinite;
}

@keyframes rotateAura {
    to {
    transform: rotate(360deg);
  }
}

@keyframes glitchOne {
  0%, 88%, 100% { transform: translate(0); }
  90% { transform: translate(-3px, 1px); }
  92% { transform: translate(2px, -1px); }
  94% { transform: translate(-1px, 2px); }
}

@keyframes glitchTwo {
  0%, 86%, 100% { transform: translate(0); }
  88% { transform: translate(3px, -1px); }
  91% { transform: translate(-2px, 1px); }
  95% { transform: translate(1px, -2px); }
}

@keyframes pulseOrb {
  0%, 100% {
    transform: scale(1);
    filter: brightness(1);
  }
  50% {
    transform: scale(1.04);
    filter: brightness(1.18);
  }
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

@keyframes spinReverse {
  to {
    transform: rotate(-360deg);
  }
}

@media (max-width: 850px) {
  .navbar {
    gap: 18px;
  }

  .nav-links {
    display: none;
  }

  .hero-header {
    grid-template-columns: 1fr;
    padding: 60px 0;
    text-align: center;
  }

  .hero-content p {
    margin-left: auto;
    margin-right: auto;
      }

  .hero-actions {
    justify-content: center;
  }

  .hero-orb {
    width: min(300px, 70vw);
  }
}
  </style>
</head>
<body>
  <header class="alis-header">
  <div class="header-bg"></div>

  <nav class="navbar">
    <a href="#" class="logo">
      <span class="logo-mark">◆</span>
      <span class="logo-text" data-text="COGU">COGU</span>
    </a>

    <ul class="nav-links">
      <li><a href="#">Início</a></li>
      <li><a href="#">Projetos</a></li>
      <li><a href="#">Sobre</a></li>
      <li><a href="#">Contato</a></li>
    </ul>

    <a href="#" class="nav-button">Entrar no caos</a>
  </nav>

  <section class="hero-header">
    <div class="hero-content">
      <span class="eyebrow">DEV • DARK FANTASY • GLITCH</span>

      <h1>
        Criando mundos em
        <span>código roxo</span>
      </h1>

      <p>
        Interfaces sombrias, sistemas bugados com estilo e magia digital
        compilada direto das trevas.
      </p>

      <div class="hero-actions">
        <a href="#" class="primary-btn">Ver projetos</a>
        <a href="#" class="secondary-btn">Conhecer mais</a>
      </div>
    </div>
        <div class="hero-orb">
      <div class="orb-core"></div>
      <div class="orb-ring ring-1"></div>
      <div class="orb-ring ring-2"></div>
    </div>
  </section>
</header>
</body>
</html>
